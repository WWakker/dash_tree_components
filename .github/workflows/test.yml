name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          # Separate call on purpose: dash's testing extra pins selenium<=4.2.0
          # (stale), making a joint resolve impossible (see tests/requirements.txt).
          pip install --upgrade "selenium>=4.15"
      # Building on Linux also guards against case-sensitive import paths
      # that a macOS checkout would not catch.
      - name: Build bundle and backends
        run: npm run build
      - name: Run integration tests
        run: pytest tests/ --headless
